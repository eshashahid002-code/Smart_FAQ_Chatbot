<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart FAQ Chatbot</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#07122f,#133c8b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

h1{
    text-align:center;
}

#chatbox{
    height:350px;
    overflow-y:auto;
    background:rgba(0,0,0,0.2);
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 Smart FAQ Chatbot</h1>

<div id="chatbox"></div>

<input id="userInput" placeholder="Ask a question...">

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤 Speak</button>

</div>

<script src="app.js"></script>

</body>
</html>
